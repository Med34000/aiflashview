<title>AI-FlashView — Quelle IA pour quoi, à quel prix</title>

<style>
  :root{
    --bg:#0b0f1a; --panel:#121829; --panel2:#1a2138; --border:#232c47;
    --txt:#e8ecf6; --muted:#8b95b0; --accent:#22d3ee; --accent2:#a78bfa;
    --ok:#34d399; --warn:#fbbf24; --gold:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px 60px}

  /* Header */
  header{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .logo{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
  .logo .flash{color:var(--accent)}
  .logo .badge-os{font-size:.65rem;font-weight:600;color:var(--accent2);border:1px solid var(--accent2);border-radius:99px;padding:2px 8px;vertical-align:middle;margin-left:8px}
  .lang-toggle{display:flex;border:1px solid var(--border);border-radius:99px;overflow:hidden}
  .lang-toggle button{background:none;border:none;color:var(--muted);padding:6px 14px;cursor:pointer;font-weight:600;font-size:.85rem}
  .lang-toggle button.active{background:var(--panel2);color:var(--txt)}
  .tagline{color:var(--muted);font-size:1.05rem;margin-bottom:4px}
  .updated{font-size:.8rem;color:var(--muted);margin-bottom:20px}
  .updated .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px;animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}

  /* Bandeau scores démo (affiché seulement si scores_demo:true) */
  .demo-banner{display:none;background:linear-gradient(90deg,rgba(251,191,36,.12),rgba(167,139,250,.12));border:1px solid rgba(251,191,36,.4);border-radius:10px;padding:10px 14px;font-size:.85rem;margin-bottom:24px;color:#fde68a}

  /* Usage chips */
  .usages{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chip{background:var(--panel);border:1px solid var(--border);color:var(--txt);border-radius:99px;padding:9px 16px;cursor:pointer;font-size:.92rem;font-weight:600;transition:all .15s}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#0b0f1a;border-color:transparent}

  /* Sort */
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .sort{display:flex;gap:6px;align-items:center;font-size:.85rem;color:var(--muted)}
  .sort button{background:var(--panel);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.82rem;font-weight:600}
  .sort button.active{color:var(--accent);border-color:var(--accent)}
  .count{font-size:.85rem;color:var(--muted)}

  /* Cards */
  .grid{display:flex;flex-direction:column;gap:10px}
  .card{display:grid;grid-template-columns:44px 1.6fr 1.4fr 1fr 1fr;gap:14px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 18px;transition:border-color .15s}
  .card:hover{border-color:#3b4a75}
  .card.top1{border-color:var(--gold);background:linear-gradient(90deg,rgba(245,158,11,.07),var(--panel) 40%)}
  .rank{font-size:1.3rem;font-weight:800;color:var(--muted);text-align:center}
  .top1 .rank{color:var(--gold)}
  .model .name{font-weight:700;font-size:1.02rem}
  .model .provider{font-size:.8rem;color:var(--muted)}
  .model .flags{margin-top:4px;display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.02em}
  .tag.gold{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.4)}
  .tag.value{background:rgba(52,211,153,.12);color:var(--ok);border:1px solid rgba(52,211,153,.4)}
  .tag.budget{background:rgba(34,211,238,.1);color:var(--accent);border:1px solid rgba(34,211,238,.4)}
  .tag.eu{background:rgba(167,139,250,.12);color:var(--accent2);border:1px solid rgba(167,139,250,.4)}
  .tag.open{background:rgba(139,149,176,.12);color:var(--muted);border:1px solid var(--border)}
  .tag.swiss{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.4)}
  .info-banner{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.35);border-radius:10px;padding:10px 14px;font-size:.85rem;margin-bottom:14px;color:#a5f3fc}
  .tok{margin-bottom:14px;background:linear-gradient(90deg,rgba(34,211,238,.09),rgba(167,139,250,.09));border:1px solid rgba(34,211,238,.5);border-radius:14px;padding:14px 18px;box-shadow:0 0 18px rgba(34,211,238,.07)}
  .tok summary{cursor:pointer;font-weight:800;color:var(--accent);font-size:1.02rem}
  .tok summary:hover{text-decoration:underline}
  .tok p{margin:8px 0;font-size:.88rem;color:var(--muted)}
  .tok b{color:var(--txt)}

  /* Réponse express : les 3 gagnants de la vue courante */
  .reco{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .reco .pick{flex:1;min-width:170px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
  .reco .pick.gold{border-color:rgba(245,158,11,.5)}
  .reco .pick .k{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .reco .pick .v{font-weight:800;font-size:1rem}
  .reco .pick .p{font-size:.78rem;color:var(--muted)}

  /* Détails dépliables par carte */
  .card{position:relative;cursor:pointer}
  .chev{position:absolute;top:10px;right:14px;color:var(--muted);font-size:.75rem;transition:transform .15s}
  .card.exp .chev{transform:rotate(90deg);color:var(--accent)}
  .det{display:none;grid-column:1/-1;border-top:1px solid var(--border);margin-top:8px;padding-top:12px;grid-template-columns:repeat(3,1fr);gap:10px 16px}
  .card.exp .det{display:grid}
  .det .k{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .det .v{font-size:.88rem;font-weight:600}
  .det .wide{grid-column:1/-1}
  .det .note{grid-column:1/-1;font-size:.75rem;color:var(--muted);font-style:italic}
  @media(max-width:760px){ .det{grid-template-columns:1fr 1fr} }
  .collections{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .chip.coll.active{background:var(--panel2);color:var(--txt);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}

  .scorebox .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .scorebar{background:var(--panel2);border-radius:99px;height:10px;overflow:hidden;margin-bottom:4px}
  .scorebar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .scoreval{font-weight:800;font-size:1.05rem}
  .scoreval small{font-weight:500;color:var(--muted);font-size:.75rem}

  .price .lbl,.sub .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .price .val,.sub .val{font-weight:700;font-size:.95rem}
  .price .detail,.sub .detail{font-size:.76rem;color:var(--muted)}
  .verif{font-size:.68rem;margin-top:3px}
  .verif.ok{color:var(--ok)}
  .verif.todo{color:var(--warn)}

  /* Footer / methodo */
  details{margin-top:34px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 20px}
  summary{cursor:pointer;font-weight:700;color:var(--accent)}
  details p{margin:10px 0;font-size:.9rem;color:var(--muted)}
  footer{margin-top:28px;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border);padding-top:18px}
  footer a{color:var(--accent);text-decoration:none}

  @media(max-width:760px){
    .card{grid-template-columns:32px 1fr;grid-template-areas:"rank model" "rank score" "rank sub" "rank price"}
    .rank{grid-area:rank;align-self:start;padding-top:4px}
    .model{grid-area:model}.scorebox{grid-area:score}.sub{grid-area:sub}.price{grid-area:price}
    .scorebox,.sub,.price{margin-top:8px}
  }
</style>
</head>

// ============ ÉTAT ============
let lang = "fr", usage = "redaction", sortMode = "score", collection = "all";
const expanded = {};

// état partageable via l'URL (#l=fr&c=free&u=code&s=score)
(function(){
  try{
    const p = new URLSearchParams(location.hash.slice(1));
    if(["fr","en"].includes(p.get("l"))) lang = p.get("l");
    if(["all","swiss","free"].includes(p.get("c"))) collection = p.get("c");
    if(USAGES.some(u=>u.id===p.get("u"))) usage = p.get("u");
    if(["score","price"].includes(p.get("s"))) sortMode = p.get("s");
  }catch(e){}
})();
function syncHash(){
  try{ history.replaceState(null,"",`#l=${lang}&c=${collection}&u=${usage}&s=${sortMode}`); }catch(e){}
}
const inCollection = m => collection==="all" ? true : collection==="swiss" ? m.tags.includes("swiss") : m.subPrice==="0|0";

// ============ HELPERS ============
const blended = m => m.in * 0.25 + m.out * 0.75; // proxy prix "usage réel" (75% output)
const t = k => I18N[lang][k];
const score = m => (m.scores && typeof m.scores[usage]==="number") ? m.scores[usage] : null; // null = données AA introuvables pour ce modèle
const fmtDate = iso => { // "2026-07-13" → "13.07.2026" (fr) / "2026-07-13" (en)
  if(!iso) return "?";
  const [y,mo,d] = iso.split("-");
  return lang==="fr" ? `${d}.${mo}.${y}` : iso;
};

function computeBadges(list){
  const badges = {};
  const add = (m,b)=>{ if(!m) return; badges[m.id]=badges[m.id]||[]; badges[m.id].push(b); };
  const scored = list.filter(m=>score(m)!==null);
  add([...scored].sort((a,b)=>score(b)-score(a))[0], "top");
  // rapport qualité/prix : score^3 / prix API (sinon le moins cher gagne toujours), seuil qualité >= 75, gratuits exclus (imbattables)
  let pool = scored.filter(m=>score(m)>=75 && blended(m)>0);
  if(!pool.length) pool = scored.filter(m=>blended(m)>0);
  add([...pool].sort((a,b)=> (Math.pow(score(b),3)/blended(b)) - (Math.pow(score(a),3)/blended(a)))[0], "value");
  // petit budget : le moins cher (gratuit accepté) avec score >= 60
  add([...scored].filter(m=>score(m)>=60).sort((a,b)=>blended(a)-blended(b))[0], "budget");
  return badges;
}

// ============ RENDER ============
function render(){
  // i18n statique (innerHTML : textes internes maîtrisés, avec <b>)
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v = t(el.dataset.i18n);
    if(typeof v === "string") el.innerHTML = v;
  });
  // date de mise à jour (depuis latest.json) + bandeau démo seulement si scores_demo:true
  document.getElementById("updated-txt").innerHTML = t("updated")(fmtDate(DATA.updated));
  const banner = document.getElementById("demo-banner");
  banner.innerHTML = t("demo");
  banner.style.display = DATA.scores_demo ? "block" : "none";
  // bannière pédagogique de la vue Gratuites
  document.getElementById("freebanner").innerHTML = collection==="free" ? `<div class="info-banner">${t("freeBanner")}</div>` : "";
  document.documentElement.lang = lang;
  document.getElementById("btn-fr").classList.toggle("active", lang==="fr");
  document.getElementById("btn-en").classList.toggle("active", lang==="en");
  document.getElementById("sort-score").classList.toggle("active", sortMode==="score");
  document.getElementById("sort-price").classList.toggle("active", sortMode==="price");

  // chips collections + usages
  document.getElementById("collections").innerHTML = COLLECTIONS.map(c=>
    `<button class="chip coll ${c.id===collection?'active':''}" onclick="setCollection('${c.id}')">${c[lang]}</button>`).join("");
  document.getElementById("usages").innerHTML = USAGES.map(u=>
    `<button class="chip ${u.id===usage?'active':''}" onclick="setUsage('${u.id}')">${u[lang]}</button>`).join("");

  // filtre + tri (scores null → en fin de liste)
  let list = DATA.models.filter(inCollection);
  if(sortMode==="score") list.sort((a,b)=>(score(b)??-1)-(score(a)??-1));
  else list.sort((a,b)=>blended(a)-blended(b));

  const badges = computeBadges(list);
  document.getElementById("count").textContent = t("count")(list.length);
  syncHash();

  // réponse express : les gagnants de la vue courante
  const findB = tag => list.find(m=>(badges[m.id]||[]).includes(tag));
  const picks = [["top",findB("top")],["value",findB("value")],["budget",findB("budget")]].filter(p=>p[1]);
  document.getElementById("reco").innerHTML = picks.map(([tag,m])=>{
    const sp = m.subPrice.split("|")[lang==="fr"?0:1];
    return `<div class="pick ${tag==='top'?'gold':''}"><div class="k">${t(tag)}</div><div class="v">${m.name}</div><div class="p">${sp==="0" ? t("free")+" · "+m.sub[lang] : m.sub[lang]+" · "+sp}</div></div>`;
  }).join("");

  document.getElementById("grid").innerHTML = list.map((m,i)=>{
    const sc = score(m);
    const bs = (badges[m.id]||[]).map(b=>`<span class="tag ${b==='top'?'gold':b}">${t(b)}</span>`).join("");
    const ts = m.tags.map(x=>`<span class="tag ${x}">${t(x)}</span>`).join("");
    const subPrice = m.subPrice.split("|")[lang==="fr"?0:1];
    const isTop = (badges[m.id]||[]).includes("top") && sortMode==="score";
    const info = INFO[m.id];
    const det = info ? `
      <div class="det">
        <div><div class="k">${t("detPays")}</div><div class="v">${info.flag} ${info.country[lang]}</div></div>
        <div><div class="k">${t("detSortie")}</div><div class="v">${info.released}</div></div>
        <div><div class="k">${t("detTaille")}</div><div class="v">${info.params[lang]}</div></div>
        <div class="wide"><div class="k">${t("detPlus")}</div><div class="v">${info.plus[lang]}</div></div>
        <div class="wide"><div class="k">${t("detLimite")}</div><div class="v">${info.minus[lang]}</div></div>
        <div class="note">${t("detNote")}</div>
      </div>` : "";
    return `
    <div class="card ${isTop?'top1':''} ${expanded[m.id]?'exp':''}" role="button" tabindex="0" aria-expanded="${!!expanded[m.id]}" onclick="toggleExpand('${m.id}')" onkeydown="cardKey(event,'${m.id}')">
      <div class="chev">▶</div>
      <div class="rank">${i+1}</div>
      <div class="model">
        <div class="name">${m.name}</div>
        <div class="provider">${m.provider} · ${m.ctx} ${t("ctx")}</div>
        <div class="flags">${bs}${ts}</div>
      </div>
      <div class="scorebox">
        <div class="lbl">${t("score")} — ${USAGES.find(u=>u.id===usage)[lang].replace(/^[^ ]+ /,"")}</div>
        <div class="scorebar"><i style="width:${sc??0}%"></i></div>
        <div class="scoreval">${sc===null ? `<small>${t("noScore")}</small>` : `${sc}<small>/100</small>`}</div>
      </div>
      <div class="sub">
        <div class="lbl">${t("sub")}</div>
        <div class="val">${subPrice==="0" ? t("free") : m.sub[lang]}</div>
        <div class="detail">${subPrice==="0" ? m.sub[lang] : subPrice}</div>
        <div class="verif ${m.verified?'ok':'todo'}">${m.verified?t("verifOk")(fmtDate(m.verified_date||DATA.updated)):t("verifTodo")}</div>
      </div>
      <div class="price">
        <div class="lbl">${t("api")}</div>
        <div class="val">${blended(m)===0 ? t("freeOpen") : `$${m.in.toFixed(2)} / $${m.out.toFixed(2)}`}</div>
        <div class="detail">${blended(m)===0 ? t("selfHost") : t("perM")}</div>
      </div>
      ${det}
    </div>`;
  }).join("");
}

function setLang(l){ lang=l; render(); }
function setUsage(u){ usage=u; render(); }
function setSort(s){ sortMode=s; render(); }
function setCollection(c){ collection=c; render(); }
function toggleExpand(id){ expanded[id]=!expanded[id]; render(); }
function cardKey(e,id){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggleExpand(id); } }

render();

// ============ DONNÉES LIVE ============
// Charge data/latest.json (généré par le pipeline). En file:// ou si absent → le fallback inline reste affiché.
fetch("../data/latest.json")
  .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(d => { if(d && Array.isArray(d.models) && d.models.length){ DATA = d; render(); } })
  .catch(() => { /* fallback inline conservé */ });
</script>
